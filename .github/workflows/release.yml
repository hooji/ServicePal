name: Tag Release

# Builds a GitHub Release (fat jar + sources jar) whenever a v* tag is pushed,
# or when dispatched with an existing tag (this is how the "Bump version and
# release" workflow kicks it off, since a tag pushed with the automatic
# GITHUB_TOKEN can't trigger the push event below).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.1.3)'
        required: true
        type: string

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a tag push this is the tag ref; on a dispatched run it's the
          # tag supplied as an input.
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Baseline is JDK 21 for now (the implemented backends are subprocess +
      # file I/O, no FFM). Bump to 25 when the Windows FFM service host lands.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Resolve tag and version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Building release ${TAG} (version ${TAG#v})"

      - name: Build fat jar and sources jar
        # The release version comes entirely from the tag via the CI-friendly
        # -Drevision override; no POM mutation needed.
        run: mvn -B -ntp -Drevision=${{ steps.ver.outputs.version }} -DskipTests package

      - name: Stage release artifacts
        run: |
          V=${{ steps.ver.outputs.version }}
          mkdir -p release
          cp target/servicepal.jar "release/servicepal-${V}.jar"
          cp target/servicepal-sources.jar "release/servicepal-${V}-sources.jar"
          ls -l release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V=${{ steps.ver.outputs.version }}
          TAG=${{ steps.ver.outputs.tag }}
          gh release create "${TAG}" \
            "release/servicepal-${V}.jar" \
            "release/servicepal-${V}-sources.jar" \
            --title "${TAG}" \
            --notes "Automated release ${TAG}.

          Assets:
          - \`servicepal-${V}.jar\` — runnable fat jar (library + discovery CLI + dd-plist). Run: \`java -jar servicepal-${V}.jar\`.
          - \`servicepal-${V}-sources.jar\` — library sources (for IDE attachment)."
