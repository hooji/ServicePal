name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Baseline is JDK 21 for now: the implemented backends (macOS launchd discovery)
      # are pure subprocess + file I/O with no FFM. Bump to 25 when the Windows FFM
      # service host lands (FFM is final in 22; 25 is the first LTS with it final).
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test
        run: mvn -B -ntp verify

      # Discovery is real on macOS; on Linux/Windows the CLI prints a friendly
      # "not implemented yet" message and exits 0. Either way it must not crash.
      - name: Smoke-test discovery CLI
        run: java -jar target/servicepal.jar
